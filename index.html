<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇 Snake Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0,255,136,0.3);
    }
    #game-container {
      position: relative;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,255,136,0.1);
    }
    canvas {
      display: block;
      border-radius: 8px;
      background: #0a0a15;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
    }
    #score-board {
      display: flex;
      justify-content: space-between;
      width: 400px;
      margin-bottom: 15px;
      font-size: 1.2rem;
    }
    .score { color: #00ff88; }
    .high-score { color: #ff6b6b; }
    #start-btn {
      margin-top: 20px;
      padding: 12px 40px;
      font-size: 1.2rem;
      background: linear-gradient(90deg, #00ff88, #00ccff);
      border: none;
      border-radius: 25px;
      color: #1a1a2e;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0,255,136,0.4);
    }
    #start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0,255,136,0.6);
    }
    #start-btn:disabled {
      background: #666;
      cursor: not-allowed;
      box-shadow: none;
    }
    #instructions {
      margin-top: 20px;
      color: #888;
      font-size: 0.9rem;
    }
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      padding: 30px 50px;
      border-radius: 15px;
      text-align: center;
      display: none;
      box-shadow: 0 0 50px rgba(255,107,107,0.5);
    }
    .game-over h2 {
      color: #ff6b6b;
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .game-over p {
      font-size: 1.2rem;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <h1>🐍 贪吃蛇</h1>
  <div id="score-board">
    <span>得分: <span class="score" id="score">0</span></span>
    <span>最高: <span class="high-score" id="high-score">0</span></span>
  </div>
  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="game-over" id="game-over">
      <h2>游戏结束!</h2>
      <p>最终得分: <span id="final-score">0</span></p>
      <button onclick="resetGame()">再来一局</button>
    </div>
  </div>
  <button id="start-btn" onclick="startGame()">开始游戏</button>
  <p id="instructions">使用 ↑ ↓ ← → 或 WASD 控制方向</p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const GRID = 20;
    const GRID_COUNT = canvas.width / GRID;
    
    let snake = [];
    let food = {};
    let direction = { x: 0, y: 0 };
    let nextDirection = { x: 0, y: 0 };
    let score = 0;
    let highScore = localStorage.getItem('snakeHighScore') || 0;
    let gameLoop = null;
    let isRunning = false;
    let speed = 120;

    document.getElementById('high-score').textContent = highScore;

    function initGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      speed = 120;
      document.getElementById('score').textContent = score;
      spawnFood();
    }

    function spawnFood() {
      food = {
        x: Math.floor(Math.random() * GRID_COUNT),
        y: Math.floor(Math.random() * GRID_COUNT)
      };
      // 确保食物不生成在蛇身上
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          spawnFood();
          break;
        }
      }
    }

    function draw() {
      // 清空画布
      ctx.fillStyle = '#0a0a15';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制网格（可选）
      ctx.strokeStyle = 'rgba(255,255,255,0.03)';
      for (let i = 0; i < GRID_COUNT; i++) {
        ctx.beginPath();
        ctx.moveTo(i * GRID, 0);
        ctx.lineTo(i * GRID, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * GRID);
        ctx.lineTo(canvas.width, i * GRID);
        ctx.stroke();
      }

      // 绘制食物
      const foodGradient = ctx.createRadialGradient(
        food.x * GRID + GRID/2, food.y * GRID + GRID/2, 0,
        food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2
      );
      foodGradient.addColorStop(0, '#ff6b6b');
      foodGradient.addColorStop(1, '#ee5a5a');
      ctx.fillStyle = foodGradient;
      ctx.beginPath();
      ctx.arc(food.x * GRID + GRID/2, food.y * GRID + GRID/2, GRID/2 - 2, 0, Math.PI * 2);
      ctx.fill();

      // 绘制蛇
      snake.forEach((segment, index) => {
        const gradient = ctx.createLinearGradient(
          segment.x * GRID, segment.y * GRID,
          (segment.x + 1) * GRID, (segment.y + 1) * GRID
        );
        if (index === 0) {
          gradient.addColorStop(0, '#00ff88');
          gradient.addColorStop(1, '#00cc6a');
        } else {
          const alpha = 1 - (index / snake.length) * 0.5;
          gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
          gradient.addColorStop(1, `rgba(0, 204, 106, ${alpha})`);
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(segment.x * GRID + 1, segment.y * GRID + 1, GRID - 2, GRID - 2);
        
        // 蛇眼睛
        if (index === 0) {
          ctx.fillStyle = '#1a1a2e';
          const eyeSize = 3;
          const eyeOffset = 5;
          ctx.beginPath();
          ctx.arc(segment.x * GRID + eyeOffset, segment.y * GRID + eyeOffset, eyeSize, 0, Math.PI * 2);
          ctx.arc(segment.x * GRID + GRID - eyeOffset, segment.y * GRID + eyeOffset, eyeSize, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function update() {
      direction = nextDirection;
      
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      
      // 碰撞检测
      if (head.x < 0 || head.x >= GRID_COUNT || head.y < 0 || head.y >= GRID_COUNT) {
        gameOver();
        return;
      }
      
      for (let segment of snake) {
        if (head.x === segment.x && head.y === segment.y) {
          gameOver();
          return;
        }
      }
      
      snake.unshift(head);
      
      // 吃到食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        document.getElementById('score').textContent = score;
        
        // 速度递增
        if (speed > 50) speed -= 2;
        
        spawnFood();
        
        // 超过100分加速
        if (score % 50 === 0) {
          clearInterval(gameLoop);
          gameLoop = setInterval(update, speed);
        }
      } else {
        snake.pop();
      }
      
      draw();
    }

    function gameOver() {
      isRunning = false;
      clearInterval(gameLoop);
      document.getElementById('final-score').textContent = score;
      document.getElementById('game-over').style.display = 'block';
      document.getElementById('start-btn').disabled = false;
      
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        document.getElementById('high-score').textContent = highScore;
      }
    }

    function resetGame() {
      document.getElementById('game-over').style.display = 'none';
      initGame();
      draw();
    }

    function startGame() {
      if (isRunning) return;
      document.getElementById('start-btn').disabled = true;
      document.getElementById('game-over').style.display = 'none';
      initGame();
      isRunning = true;
      draw();
      gameLoop = setInterval(update, speed);
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (!isRunning) return;
      
      const keyMap = {
        'ArrowUp': { x: 0, y: -1 },
        'ArrowDown': { x: 0, y: 1 },
        'ArrowLeft': { x: -1, y: 0 },
        'ArrowRight': { x: 1, y: 0 },
        'w': { x: 0, y: -1 },
        'W': { x: 0, y: -1 },
        's': { x: 0, y: 1 },
        'S': { x: 0, y: 1 },
        'a': { x: -1, y: 0 },
        'A': { x: -1, y: 0 },
        'd': { x: 1, y: 0 },
        'D': { x: 1, y: 0 }
      };
      
      const newDir = keyMap[e.key];
      if (newDir) {
        e.preventDefault();
        // 防止直接反向
        if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
          nextDirection = newDir;
        }
      }
    });

    // 初始绘制
    draw();
  </script>
</body>
</html>
